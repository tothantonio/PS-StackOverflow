name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  notification-service-tests:
    name: Notification Service Tests
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: notification-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run Maven tests
        run: mvn clean test

  java-tests:
    name: Java Unit Tests
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run Maven tests
        run: mvn clean test

  frontend-tests:
    name: React Vitest Tests
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test:ci

  lint:
    name: Frontend ESLint
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  cypress-e2e:
  name: Cypress E2E Tests
  runs-on: ubuntu-24.04

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Node for frontend
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend deps
      working-directory: frontend
      run: npm ci

    # Java for backend
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 25
        cache: maven

    - name: Start backend
      working-directory: backend
      run: mvn spring-boot:run &

    - name: Start frontend
      working-directory: frontend
      run: npm run dev &

    - name: Wait for frontend
      run: npx wait-on http://localhost:5173

    - name: Run Cypress tests
      working-directory: frontend
      run: npm run cy:run