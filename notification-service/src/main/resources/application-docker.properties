# Used when notification-service runs in Docker Compose (with MailHog).
notification.email.mode=smtp
spring.mail.host=mailhog
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
notification.mail.from=ban@stackoverflow.local

# SMS: set NOTIFICATION_SMS_MODE=twilio and Twilio vars in root .env
notification.sms.mode=${NOTIFICATION_SMS_MODE:console}
