server.port=8081
spring.application.name=notification-service

# Delivery modes: console (log only) | smtp (email) | twilio (SMS)
# For real ban notifications locally, use MailHog + Twilio — see README.
notification.email.mode=${NOTIFICATION_EMAIL_MODE:console}
notification.sms.mode=${NOTIFICATION_SMS_MODE:console}

# SMTP (set NOTIFICATION_EMAIL_MODE=smtp and configure host)
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:true}
notification.mail.from=${NOTIFICATION_MAIL_FROM:noreply@stackoverflow.local}

# Twilio (set NOTIFICATION_SMS_MODE=twilio)
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}
